name: Generate weekly article

on:
  workflow_dispatch:
    inputs:
      source:
        description: Optional trigger source
        required: false
        type: string
  schedule:
    # Vercel Cron is the primary trigger at Tuesday 08:00 Paris during summer time.
    # Keep the GitHub fallback away from the top of the hour.
    - cron: '17 6 * * 2'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    concurrency:
      group: weekly-article-generator-${{ github.ref }}
      cancel-in-progress: false
    env:
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      VITE_SITE_URL: https://lecyberassureur.fr
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check scheduled article already generated today
        id: scheduled_guard
        if: github.event_name == 'schedule' || github.event.inputs.source == 'vercel-cron'
        run: |
          node -e "const fs=require('fs'); const used=JSON.parse(fs.readFileSync('scripts/used-article-images.json','utf8')); const today=new Date().toISOString().slice(0,10); const already=used.some((item)=>(item.usedAt||'').slice(0,10)===today); fs.appendFileSync(process.env.GITHUB_OUTPUT, 'already_generated=' + already + '\n'); console.log(already ? 'Article already generated today, skipping.' : 'No article generated today yet.');"

      - name: Generate article
        if: steps.scheduled_guard.outputs.already_generated != 'true'
        run: npm run generate:article

      - name: Detect generated article
        id: generated
        run: |
          if git diff --quiet -- src/data/articles.ts scripts/used-article-images.json public/articles; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No article generated."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Article generated."
          fi

      - name: Typecheck
        if: steps.generated.outputs.has_changes == 'true'
        run: npm run typecheck

      - name: Build static pages
        if: steps.generated.outputs.has_changes == 'true'
        run: npm run build

      - name: Commit generated article
        if: steps.generated.outputs.has_changes == 'true'
        run: |
          if git diff --quiet; then
            echo "No generated article to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/articles.ts public/articles scripts/used-article-images.json public/sitemap.xml
          git commit -m "Generate weekly cyber article"
          git push
